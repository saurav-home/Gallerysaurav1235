name: Build Prism Unsigned Release App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # THE FIX: This command creates the missing gradlew files automatically!
      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -Pksp.incremental=false -Dorg.gradle.jvmargs="-Djava.awt.headless=true"

      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Prism-Unsigned-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7

